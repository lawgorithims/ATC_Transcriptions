# Configuration for live ATC transcription



model:

  # Weights fetched by scripts/download_model.py into live_pipeline.model_path (below).
  # Default = small (whisper-small fine-tune). For the more-accurate large-v3-turbo
  # fine-tune (~3.5x slower on MPS, still ~2x real-time), switch the three "turbo:"
  # values — here and live_pipeline.model_path — then re-run download_model.py.

  hf_repo: "SingularityUS/ATC-whisper-v1"          # turbo: "SingularityUS/ATC-whisper-turbo-v1"

  hf_filename: "model.safetensors"

  expected_bytes: 966995080                        # ~922 MB small.  turbo: 3235581408  (~3.0 GB)

  # Optional direct URL fallback (skips Hugging Face when set):

  # download_url: "https://example.com/model.safetensors"



live_pipeline:

  feed_config: "airport_configs/kdfw.json"

  feed: "lone_star_approach_17c_final"

  model_path: "models/whisper-atc"              # turbo: "models/whisper-atc-turbo"

  device: "auto"

  enable_preprocessing: true

  aggressive_preprocessing: true

  vad_aggressiveness: 2

  silence_duration_ms: 700

  min_speech_duration_ms: 500

  max_segment_duration_s: 12.0

  report_interval: 10

  context_history: 3

  # Airport-mode context (airport_context pipeline). Leave airport blank ("") to

  # use the hand-curated feed_config context instead. Requires the database:

  #   python -m airport_context.cli ingest

  airport: ""

  frequency_type: "unknown"

  # candidate_callsigns: ["DAL1234", "SKW5670"]

  max_prompt_words: 600

  log_context_snapshots: false


