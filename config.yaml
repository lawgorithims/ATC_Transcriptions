# Configuration for live ATC transcription



model:

  # Two fine-tuned models. scripts/download_model.py fetches BOTH so the web server
  # can switch between them with no new download.
  small:
    path: "models/whisper-atc"
    hf_repo: "SingularityUS/ATC-whisper-v1"
    hf_filename: "model.safetensors"
    expected_bytes: 966995080        # ~922 MB
  turbo:
    path: "models/whisper-atc-turbo"
    hf_repo: "SingularityUS/ATC-whisper-turbo-v1"
    hf_filename: "model.safetensors"
    expected_bytes: 3235581408       # ~3.0 GB

  # Web-server adaptive selection (browser console only): load `default`, benchmark it
  # on the proof-of-life test, and auto-fall-back to `fallback` if the device runs
  # slower than min_realtime_speed (x faster than real-time; adjustable in UI Settings).
  adaptive: true
  default: turbo
  fallback: small
  min_realtime_speed: 1.2



live_pipeline:

  feed_config: "airport_configs/kdfw.json"

  feed: "lone_star_approach_17c_final"

  model_path: "models/whisper-atc-turbo"        # CLI pipeline model (no adaptive swap). small: "models/whisper-atc"

  device: "auto"

  enable_preprocessing: true

  aggressive_preprocessing: true

  vad_aggressiveness: 2

  silence_duration_ms: 700

  min_speech_duration_ms: 500

  max_segment_duration_s: 12.0

  report_interval: 10

  context_history: 3

  # Airport-mode context (airport_context pipeline). Leave airport blank ("") to

  # use the hand-curated feed_config context instead. Requires the database:

  #   python -m airport_context.cli ingest

  airport: ""

  frequency_type: "unknown"

  # candidate_callsigns: ["DAL1234", "SKW5670"]

  max_prompt_words: 600

  log_context_snapshots: false


