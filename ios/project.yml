# XcodeGen spec for the ATC_Transcribe iOS app.
#
# This file is the source of truth for the Xcode project so it can be authored as
# plain text on Windows. On the Mac (the Scaleway M4 build box) regenerate with:
#
#     brew install xcodegen          # one-time
#     cd ios && xcodegen generate    # writes ATCTranscribe.xcodeproj (git-ignored)
#     xcodebuild -project ATCTranscribe.xcodeproj -scheme ATCTranscribe \
#                -destination 'platform=iOS Simulator,name=iPhone 15' test
#
# WhisperKit is intentionally NOT wired yet — the deterministic core (models,
# context, corrector) is pure Foundation and builds with no dependencies, so the
# first green build is fast. The WhisperKit Swift package is added in the
# "Convert models to CoreML + wire WhisperKit" phase.

name: ATCTranscribe
options:
  bundleIdPrefix: com.flycommsight
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"   # bumped from 13.0 for the StanfordBDHG llama.cpp SwiftPM mirror (needs macOS 14)

settings:
  base:
    MARKETING_VERSION: "1.0"   # build 1 shipped as 1.0; keep the same train so build N is 1.0 (N)
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: ""   # set on the Mac for on-device (not Simulator) builds

packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "1.0.0"
  # llama.cpp powers the local CPU context-fixer LLM (LocalLLMCorrector / LlamaContext).
  # NOTE: not a SwiftPM package. Upstream dropped its Package.swift, and the StanfordBDHG
  # mirror's xcframework leaks C++ headers (grammar-parser.h) into the C `llama` module, so
  # Swift can't import it. We instead vendor a `llama.xcframework` built from a recent
  # llama.cpp via Tools/build_llama_xcframework.sh (clean C module + modern API), wired as a
  # binary framework below. LlamaContext is `#if canImport(llama)`, so the app/probe build
  # fine without it (local LLM just unavailable until the xcframework is in place).

targets:
  ATCTranscribe:
    type: application
    platform: iOS
    sources:
      # Resource folders are added as FOLDER REFERENCES below (not the recursive glob) so the
      # `.mlmodelc`/`.gguf` bundles ship verbatim and JSON folders keep their subdirectory in the
      # built bundle (so `Bundle.url(forResource:subdirectory:)` resolves); exclude them from the
      # glob to avoid double-adding / flattening.
      - path: ATCTranscribe
        excludes:
          - "Resources/Models"
          - "Resources/DemoClips"
          - "Resources/knowledge"
          - "Resources/airport_configs"
          - "Resources/airports"
      - path: ATCTranscribe/Resources/Models      # `small` Whisper model + `llm/<model>.gguf`,
        type: folder                              #   placed by Tools/testflight.sh + fetch_llm_model.sh
      - path: ATCTranscribe/Resources/DemoClips    # 5 known-good clips → offline Replay demo
        type: folder
      - path: ATCTranscribe/Resources/knowledge    # RAG corpus: airlines / overrides / phraseology
        type: folder
      - path: ATCTranscribe/Resources/airport_configs   # facility configs (runways, fixes, streams)
        type: folder
      - path: ATCTranscribe/Resources/airports          # ICAO -> lat/lon for ADS-B query centering
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flycommsight.atctranscribe
        TARGETED_DEVICE_FAMILY: "1,2"      # 1 = iPhone, 2 = iPad (universal)
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ATCTranscribe/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # Assets.xcassets/AppIcon.appiconset
    info:
      path: ATCTranscribe/Info.plist
      properties:
        CFBundleDisplayName: CommSight
        # Bind the bundle version to the build settings so `CURRENT_PROJECT_VERSION=<n>` at archive
        # time (ship_testflight.sh's BUILD_NUMBER) actually bumps CFBundleVersion. Without this,
        # xcodegen writes a literal "1" and every upload collides with build 1.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "CommSight uses the microphone to capture and transcribe live ATC audio."
        # Connecting to a Stratux receiver on the local Wi-Fi (audio sidecar + traffic/GPS web API) needs
        # the local-network permission (iOS 14+) and a cleartext-local ATS exception (the link is http/ws
        # to 192.168.x.x). NSAllowsLocalNetworking is scoped to LOCAL hosts, so non-local loads are
        # unaffected.
        NSLocalNetworkUsageDescription: "CommSight connects to a Stratux receiver on your local Wi-Fi to receive live cockpit audio, aircraft traffic, and GPS."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
      # Local CPU context-fixer LLM. Vendored dynamic xcframework (built by
      # Tools/build_llama_xcframework.sh, git-ignored). Embedded into the app's Frameworks/
      # (install_name @rpath/llama.framework/llama → resolved by the default app rpath).
      - framework: Vendor/llama.xcframework
        embed: true

  ATCTranscribeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ATCTranscribeTests
    dependencies:
      - target: ATCTranscribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flycommsight.atctranscribe.tests
        GENERATE_INFOPLIST_FILE: YES

  # UI tests — drive the real app in the Simulator and tap every control (gate, themes,
  # settings, source picker, start/stop) to verify the buttons/features work end-to-end.
  ATCTranscribeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ATCTranscribeUITests
    dependencies:
      - target: ATCTranscribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flycommsight.atctranscribe.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ATCTranscribe

  # Native macOS PROBE — a command-line executable (NOT XCTest) that runs the engine +
  # proof-of-life on the Mac's REAL Neural Engine. A plain tool runs headless over SSH;
  # macOS XCTest does not (its test-runner daemon needs a GUI session). Build it, then
  # run the binary directly with ATC_MODEL_DIR + ATC_AUDIO_DIR set (see Tools/probe.sh).
  # The Simulator (no ANE) is reserved for the UI + pure-logic XCTests.
  ATCKitProbe:
    type: tool
    platform: macOS
    sources:
      - path: ATCTranscribe/Models
      - path: ATCTranscribe/Core
      - path: ATCTranscribe/Audio
      - path: ATCTranscribe/Transcription
      - path: ATCTranscribe/Engine
      # Core/LocalLLMCorrector references ModelStore (downloaded-model path lookup), which lives
      # in this Foundation-only file; the rest of Download/ (SwiftUI/WhisperKit UI) is app-only.
      - path: ATCTranscribe/Download/ModelCatalog.swift
      - path: ATCKitProbe
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
      - framework: Vendor/llama.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flycommsight.atctranscribe.probe
        # The macOS framework's install_name is @rpath/llama.framework/Versions/Current/llama;
        # point the runtime search path at the xcframework's macOS slice so the CLI tool resolves
        # the dylib at runtime without an embed phase.
        LD_RUNPATH_SEARCH_PATHS: "$(SRCROOT)/Vendor/llama.xcframework/macos-arm64_x86_64"

schemes:
  ATCTranscribe:
    build:
      targets:
        ATCTranscribe: all
        ATCTranscribeTests: [test]
        ATCTranscribeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ATCTranscribeTests
        - ATCTranscribeUITests
      # Populated from the shell at `xcodegen generate` time; empty (test skips) when
      # unset. Set them to run the on-device transcription smoke test — see
      # ATCTranscriberSmokeTests and Tools/smoke (the M4 runner).
      environmentVariables:
        ATC_MODEL_DIR: ${ATC_MODEL_DIR}
        ATC_AUDIO_DIR: ${ATC_AUDIO_DIR}
        # "1" only when regenerating README screenshots (Tools/screenshots.sh); empty otherwise, so
        # ScreenshotTests XCTSkips in the normal suite and never flakes a ship.
        SCREENSHOTS: ${SCREENSHOTS}

  # Native macOS probe: `xcodebuild build -scheme ATCKitProbe -destination platform=macOS`,
  # then run the built binary directly (env-driven). See Tools/probe.sh.
  ATCKitProbe:
    build:
      targets:
        ATCKitProbe: all
    run:
      config: Debug
