<svg width="760" viewBox="0 0 760 740" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ATC_Transcribe production data pipeline">
<title>ATC_Transcribe production data pipeline</title>
<desc>Three input modes (live microphone, live ATC web stream, stored audio replay) converge into a shared front-end (16 kHz PCM capture, VAD segmentation), then audio preprocessing and fine-tuned Whisper inference with airport context, producing a live transcript that also updates the rolling context history.</desc>
<style>
text{font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;}
.title{font-size:19px;font-weight:600;}
.sub{font-size:12px;}
.th{font-size:14px;font-weight:600;}
.ts{font-size:12px;}
.lab{font-size:12px;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="1" y="1" width="758" height="738" rx="16" fill="#FCFBF8" stroke="#E3E0D6" stroke-width="1"/>

<text class="title" x="380" y="36" text-anchor="middle" fill="#2C2C2A">ATC_Transcribe — live production pipeline</text>
<text class="sub" x="380" y="56" text-anchor="middle" fill="#5F5E5A">ATC radio audio &#8594; fine-tuned Whisper transcription</text>

<g>
<rect x="30" y="80" width="210" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="135" y="103" text-anchor="middle" dominant-baseline="central" fill="#04342C">Live microphone</text>
<text class="ts" x="135" y="121" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">realtime_transcribe.py</text>
</g>
<g>
<rect x="275" y="80" width="210" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="380" y="103" text-anchor="middle" dominant-baseline="central" fill="#04342C">Live ATC web stream</text>
<text class="ts" x="380" y="121" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">atc_stream.py + ffmpeg</text>
</g>
<g>
<rect x="520" y="80" width="210" height="58" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="625" y="103" text-anchor="middle" dominant-baseline="central" fill="#412402">Stored audio replay</text>
<text class="ts" x="625" y="121" text-anchor="middle" dominant-baseline="central" fill="#854F0B">proof-of-life samples</text>
</g>

<line x1="135" y1="138" x2="330" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="138" x2="380" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="625" y1="138" x2="430" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="192" width="300" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="380" y="212" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">16 kHz mono PCM</text>
<text class="ts" x="380" y="228" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">StreamCapture / FileSimulator</text>
</g>
<line x1="380" y1="244" x2="380" y2="278" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="278" width="300" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="380" y="298" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">VAD segmentation</text>
<text class="ts" x="380" y="314" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">WebRTC VAD &#8594; speech segments</text>
</g>
<line x1="380" y1="330" x2="380" y2="364" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="364" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="380" y="384" text-anchor="middle" dominant-baseline="central" fill="#26215C">Audio preprocessing</text>
<text class="ts" x="380" y="400" text-anchor="middle" dominant-baseline="central" fill="#534AB7">audio_preprocessing.py (shared)</text>
</g>
<line x1="380" y1="416" x2="380" y2="450" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="30" y="450" width="180" height="58" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="120" y="472" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Airport context</text>
<text class="ts" x="120" y="490" text-anchor="middle" dominant-baseline="central" fill="#993C1D">atc_context.py + JSON</text>
</g>
<line x1="210" y1="479" x2="230" y2="479" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="550" y="450" width="180" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="640" y="472" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Fine-tuned model</text>
<text class="ts" x="640" y="490" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">models/whisper-atc</text>
</g>
<line x1="550" y1="479" x2="530" y2="479" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="450" width="300" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="380" y="472" text-anchor="middle" dominant-baseline="central" fill="#26215C">Whisper inference</text>
<text class="ts" x="380" y="490" text-anchor="middle" dominant-baseline="central" fill="#534AB7">atc_transcriber.py</text>
</g>
<line x1="380" y1="508" x2="380" y2="542" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="542" width="300" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="380" y="562" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Live transcript</text>
<text class="ts" x="380" y="578" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">stdout + results/live/*.json</text>
</g>

<text class="ts" x="380" y="624" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">&#8635; each transcript is appended to atc_context's rolling history</text>

<rect x="30" y="646" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="lab" x="52" y="653" dominant-baseline="central" fill="#5F5E5A">Live, real-time input — microphone + ATC web stream</text>
<rect x="30" y="672" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="lab" x="52" y="679" dominant-baseline="central" fill="#5F5E5A">Stored audio — proof-of-life replay (must not break)</text>
<rect x="30" y="698" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="lab" x="52" y="705" dominant-baseline="central" fill="#5F5E5A">Context delivery — airport, frequency, call signs</text>
</svg>
