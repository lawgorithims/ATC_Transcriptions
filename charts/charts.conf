# charts.conf — shared configuration for the FAA chart pipeline (sourced by the build scripts).
#
# FAA charts are on a 56-day cycle. Bump CYCLE to the current effective date (MM-DD-YYYY) — see
# https://www.faa.gov/air_traffic/flight_info/aeronav/productcatalog/doles/AutoDOLE/ — and rerun.

CYCLE="${CYCLE:-05-14-2026}"

# HuggingFace dataset that stores the built MBTiles (read the token from $HF_TOKEN / ~/.hf_token).
HF_DATASET="${HF_DATASET:-SingularityUS/faa-charts}"

# Tile encoding for the mosaics: PNG is universal; WEBP is ~5× smaller (needs iOS 14+ to decode).
TILE_FORMAT="${TILE_FORMAT:-WEBP}"
QUALITY="${QUALITY:-75}"

# The 37 conterminous-US VFR sectional charts (jlmcgraw clip-shape names, minus the _SEC suffix).
# Alaska / Hawaii / Caribbean / Pacific sectionals are intentionally excluded from the CONUS mosaic.
SECTIONALS_CONUS=(
  Albuquerque Atlanta Billings Brownsville Charlotte Cheyenne Chicago Cincinnati
  Dallas_Ft_Worth Denver Detroit El_Paso Great_Falls Green_Bay Halifax Houston
  Jacksonville Kansas_City Klamath_Falls Lake_Huron Las_Vegas Los_Angeles Memphis
  Miami Montreal New_Orleans New_York Omaha Phoenix Salt_Lake_City San_Antonio
  San_Francisco Seattle St_Louis Twin_Cities Washington Wichita
)

# US IFR enroute low charts ship as one bundle (DDECUS.zip); these are the chart ids inside it
# (jlmcgraw enroute clip-shape names). ENR_L06 is split N/S.
IFR_LOW_CONUS=(
  ENR_L01 ENR_L02 ENR_L03 ENR_L04 ENR_L05 ENR_L06N ENR_L06S ENR_L07 ENR_L08 ENR_L09
  ENR_L10 ENR_L11 ENR_L12 ENR_L13 ENR_L14 ENR_L15 ENR_L16 ENR_L17 ENR_L18 ENR_L19
  ENR_L20 ENR_L21 ENR_L22 ENR_L23 ENR_L24 ENR_L25 ENR_L26 ENR_L27 ENR_L28 ENR_L29
  ENR_L30 ENR_L31 ENR_L32 ENR_L33 ENR_L34 ENR_L35 ENR_L36
)
